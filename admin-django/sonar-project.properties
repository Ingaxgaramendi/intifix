# ============================================================
# SonarCloud — Panel Admin Django (admin-django)
# ============================================================

sonar.projectKey=YOUR_ORG_intifix-admin-django
sonar.organization=YOUR_ORG
sonar.projectName=IntiFix Admin Django
sonar.projectVersion=1.0

sonar.sources=.
sonar.inclusions=**/*.py
sonar.exclusions=\
  **/venv/**,\
  **/migrations/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/staticfiles/**,\
  manage.py,\
  gunicorn.conf.py

sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

